<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Web-Tastic Date Night!</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Fredoka One"', 'cursive'],
                        sans: ['"Nunito"', 'sans-serif'],
                    },
                    colors: {
                        spidey: {
                            red: '#E02424',
                            blue: '#1C64F2',
                            light: '#FDE8E8',
                            dark: '#111928'
                        },
                        noir: {
                            100: '#E5E7EB',
                            800: '#1F2937',
                            900: '#111827'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #ffe4e6;
            background-image: radial-gradient(#fbcfe8 2.5px, transparent 2.5px), radial-gradient(#fbcfe8 2.5px, transparent 2.5px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            overflow-x: hidden;
        }

        .web-corner { position: absolute; width: 150px; height: 150px; opacity: 0.2; pointer-events: none; z-index: 0; }
        .web-top-left { top: 0; left: 0; transform: rotate(0deg); }
        .web-top-right { top: 0; right: 0; transform: rotate(90deg); }

        @keyframes swing { 0% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } 100% { transform: rotate(-10deg); } }
        .swing-animation { transform-origin: top center; animation: swing 4s ease-in-out infinite; }

        /* Party Splash Effect with Gravity */
        .party-particle {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 1.5rem;
            will-change: transform;
        }

        .thread { width: 2px; height: 80px; background-color: #4B5563; margin: 0 auto; }
        .countdown-box { background: white; border: 4px solid #E02424; box-shadow: 6px 6px 0px #1C64F2; transition: transform 0.2s; }
        .countdown-box:hover { transform: translateY(-5px); }
        .activity-card { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); transition: all 0.3s ease; border: 3px solid transparent; }
        .activity-card:hover { transform: translateY(-8px); }
        .card-noir:hover { border-color: #1F2937; box-shadow: 8px 8px 0px #1F2937; }
        .card-puzzle:hover { border-color: #1C64F2; box-shadow: 8px 8px 0px #1C64F2; }
    </style>
</head>
<body class="text-gray-800 font-sans min-h-screen relative flex flex-col items-center pb-16">

    <!-- Background Elements -->
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0 overflow-hidden">
        <div class="absolute top-10 left-10 w-48 h-48 bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-pulse"></div>
        <div class="absolute top-1/3 right-10 w-64 h-64 bg-rose-300 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-pulse" style="animation-delay: 2s"></div>
    </div>

    <!-- Hanging Spiders -->
    <div class="absolute top-0 left-10 md:left-24 swing-animation z-10">
        <div class="thread" style="height: 100px;"></div>
        <div class="w-12 h-12 bg-pink-600 rounded-full flex items-center justify-center relative shadow-lg">
            <div class="flex gap-1 z-10"><div class="spider-eye w-3 h-3 bg-white rounded-full"><div class="spider-pupil w-1.5 h-1.5 bg-black rounded-full"></div></div><div class="spider-eye w-3 h-3 bg-white rounded-full"><div class="spider-pupil w-1.5 h-1.5 bg-black rounded-full"></div></div></div>
        </div>
    </div>
    <div class="absolute top-0 right-10 md:right-32 swing-animation z-10">
        <div class="thread"></div>
        <div class="w-12 h-12 bg-gray-800 rounded-full flex items-center justify-center relative shadow-lg">
            <div class="flex gap-1 z-10"><div class="spider-eye w-3 h-3 bg-white rounded-full"><div class="spider-pupil w-1.5 h-1.5 bg-black rounded-full"></div></div><div class="spider-eye w-3 h-3 bg-white rounded-full"><div class="spider-pupil w-1.5 h-1.5 bg-black rounded-full"></div></div></div>
        </div>
    </div>

    <main class="w-full max-w-4xl px-4 mt-24 flex flex-col items-center relative z-10">
        <h1 class="font-display text-5xl text-spidey-red mb-4">Our Web-Tastic Date Night! 🕸️❤️</h1>
        
        <!-- Countdown -->
        <div class="flex gap-6 mb-16">
            <div class="countdown-box w-28 h-32 rounded-2xl flex flex-col items-center justify-center bg-white">
                <span id="hours" class="font-display text-5xl text-spidey-red">00</span><span class="text-sm font-bold text-gray-500 uppercase">Hours</span>
            </div>
            <div class="countdown-box w-28 h-32 rounded-2xl flex flex-col items-center justify-center bg-white">
                <span id="minutes" class="font-display text-5xl text-spidey-blue">00</span><span class="text-sm font-bold text-gray-500 uppercase">Mins</span>
            </div>
            <div class="countdown-box w-28 h-32 rounded-2xl flex flex-col items-center justify-center bg-white">
                <span id="seconds" class="font-display text-5xl text-gray-800">00</span><span class="text-sm font-bold text-gray-500 uppercase">Secs</span>
            </div>
        </div>
    </main>

    <script>
        // Eye tracking
        document.addEventListener('mousemove', (e) => {
            document.querySelectorAll('.spider-pupil').forEach(pupil => {
                const eye = pupil.parentElement;
                const rect = eye.getBoundingClientRect();
                const angle = Math.atan2(e.clientY - (rect.top + rect.height/2), e.clientX - (rect.left + rect.width/2));
                pupil.style.transform = `translate(${Math.cos(angle)*1.5}px, ${Math.sin(angle)*1.5}px)`;
            });
        });

        // Click with Gravity Effect
        document.addEventListener('click', (e) => {
            document.querySelectorAll('.spider-eye').forEach(eye => {
                eye.style.transform = 'scaleY(0.1)';
                setTimeout(() => eye.style.transform = 'scaleY(1)', 150);
            });

            const emojis = ['❤️', '🖤', '🐝', '🎉', '✨', '💖', '🕸️', '💫'];
            for(let i=0; i<15; i++) {
                const p = document.createElement('div');
                p.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                p.className = 'party-particle';
                p.style.left = e.clientX + 'px';
                p.style.top = e.clientY + 'px';
                document.body.appendChild(p);

                let vx = (Math.random() - 0.5) * 8;
                let vy = (Math.random() - 0.5) * 10 - 5;
                let x = 0, y = 0, gravity = 0.5;

                const animate = () => {
                    vy += gravity;
                    x += vx;
                    y += vy;
                    p.style.transform = `translate(${x}px, ${y}px) rotate(${x*2}deg)`;
                    if (y < window.innerHeight) requestAnimationFrame(animate);
                    else p.remove();
                };
                requestAnimationFrame(animate);
            }
        });

        function updateCountdown() {
            const now = new Date();
            const tz = now.toLocaleString("en-US", { timeZone: "America/Halifax" });
            const halifaxNow = new Date(tz);
            let target = new Date(halifaxNow);
            target.setHours(20, 0, 0, 0);
            if (halifaxNow > target) target.setDate(target.getDate() + 1);
            
            const diff = target - halifaxNow;
            document.getElementById("hours").innerText = Math.floor(diff / 3600000).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
